      <rect width="538" height="82" rx="16" fill="#11243a" stroke="#548ad0" stroke-opacity="0.35"/>
      <circle cx="30" cy="30" r="15" fill="#397df5"/>
      <path d="M24 30h12M30 24v12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <text x="58" y="29" fill="#e7f1fa" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13">Find reusable patterns and explain the evidence.</text>
      <text x="58" y="53" fill="#8199ac" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Objective decomposed · context assembled · tools selected</text>
    </g>

    <g transform="translate(24 184)">
      <text x="0" y="0" fill="#8199ac" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.4">DELEGATION TRACE</text>
      <g transform="translate(0 20)">
        <rect width="148" height="58" rx="13" fill="#0d1d2e" stroke="#527ba0" stroke-opacity="0.45"/>
        <text x="74" y="25" text-anchor="middle" fill="#b8cfe1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">ORCHESTRATOR</text>
        <text x="74" y="43" text-anchor="middle" fill="#5f89b3" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="9">context</text>
        <path d="M158 29h34" stroke="#5793d8" stroke-width="2" stroke-dasharray="4 5"/>
        <path d="M188 24l7 5-7 5" fill="none" stroke="#5793d8" stroke-width="2"/>
        <rect x="204" width="148" height="58" rx="13" fill="#0d1d2e" stroke="#527ba0" stroke-opacity="0.45"/>
        <text x="278" y="25" text-anchor="middle" fill="#b8cfe1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">PATTERN AGENT</text>
        <text x="278" y="43" text-anchor="middle" fill="#5f89b3" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="9">evidence</text>
        <path d="M362 29h34" stroke="#50b7bd" stroke-width="2" stroke-dasharray="4 5"/>
        <path d="M392 24l7 5-7 5" fill="none" stroke="#50b7bd" stroke-width="2"/>
        <rect x="408" width="130" height="58" rx="13" fill="#0d1d2e" stroke="#4ca5a6" stroke-opacity="0.55"/>
        <text x="473" y="25" text-anchor="middle" fill="#b8e1df" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">IMPACT</text>
        <text x="473" y="43" text-anchor="middle" fill="#55aba9" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="9">artifact</text>
      </g>
    </g>

    <g transform="translate(24 296)">
      <rect width="255" height="88" rx="15" fill="#0d1d2e" stroke="#527ba0" stroke-opacity="0.32"/>
      <text x="18" y="24" fill="#7790a4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.2">WORKSPACE EVIDENCE</text>
      <text x="18" y="53" fill="#f1f7fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700">12 sources · 4 patterns</text>
      <text x="18" y="73" fill="#7293ad" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="10">correlation IF-2048</text>
      <rect x="291" width="247" height="88" rx="15" fill="#0d1d2e" stroke="#4ca5a6" stroke-opacity="0.42"/>
      <text x="309" y="24" fill="#7790a4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.2">REUSABLE OUTPUT</text>
      <text x="309" y="52" fill="#f1f7fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700">Executive impact brief</text>
      <circle cx="318" cy="70" r="5" fill="#43d6a2" filter="url(#glow)"/>
      <text x="330" y="74" fill="#74cdb2" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="10">confidence 0.87</text>
    </g>
  </g>

  <text x="94" y="520" fill="#64829b" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" letter-spacing="1.2">NEXT.JS · CLOUDFLARE WORKERS · SUPABASE · OPENAI · IBM WATSONX / GRANITE · IBM BOB</text>
</svg>
