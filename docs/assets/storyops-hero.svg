<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">StoryOps Studio  IP Foundry V2</title>
  <desc id="desc">Enterprise creative intelligence platform with a multi-agent operating console, governed pipeline, reusable artifacts, and explainable event timeline.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1e35"/>
      <stop offset="1" stop-color="#082737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#37d4c8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8bb7d9" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="560" rx="28" fill="url(#background)"/>
  <rect width="1600" height="560" rx="28" fill="url(#grid)"/>
  <circle cx="1320" cy="70" r="240" fill="#2ecac2" opacity="0.08"/>
  <circle cx="180" cy="520" r="300" fill="#397df5" opacity="0.09"/>

  <g transform="translate(92 78)">
    <rect width="52" height="52" rx="15" fill="url(#accent)"/>
    <path d="M18 17h16M18 26h16M18 35h10" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="36" cy="35" r="4" fill="#fff"/>
  </g>

  <text x="164" y="110" fill="#d9eaff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="1">STORYOPS STUDIO</text>
  <rect x="164" y="124" width="132" height="26" rx="13" fill="#5a8fff" fill-opacity="0.16" stroke="#6f9eff" stroke-opacity="0.55"/>
  <text x="230" y="142" text-anchor="middle" fill="#9dbdff" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" font-weight="700" letter-spacing="1.3">IP FOUNDRY V2</text>

  <text x="92" y="235" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="750" letter-spacing="-2">Creative work becomes</text>
  <text x="92" y="302" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="750" letter-spacing="-2">reusable intelligence.</text>
  <text x="94" y="352" fill="#a9bfd3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Explainable multi-agent analysis · governed workflows · durable artifacts</text>

  <g transform="translate(94 406)">
    <rect width="166" height="42" rx="12" fill="#397df5"/>
    <text x="83" y="27" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">LIVE WORKSPACE</text>
    <rect x="178" width="194" height="42" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#7da1bf" stroke-opacity="0.45"/>
    <text x="275" y="27" text-anchor="middle" fill="#d5e5f3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">ARCHITECTURE DOCS</text>
  </g>

  <g transform="translate(920 74)">
    <rect width="586" height="410" rx="24" fill="#07101c" fill-opacity="0.74" stroke="#83b0d0" stroke-opacity="0.28"/>
    <circle cx="28" cy="27" r="5" fill="#ff6b6b"/>
    <circle cx="47" cy="27" r="5" fill="#ffc857"/>
    <circle cx="66" cy="27" r="5" fill="#43d6a2"/>
    <text x="92" y="32" fill="#8199ac" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" letter-spacing="1.6">AI OPERATING CONSOLE</text>
    <line x1="0" y1="54" x2="586" y2="54" stroke="#83b0d0" stroke-opacity="0.18"/>

