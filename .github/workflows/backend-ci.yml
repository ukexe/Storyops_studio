name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite:///./ci.db
      WATSONX_API_KEY: ci-placeholder
      WATSONX_PROJECT_ID: ci-placeholder
      WATSONX_URL: https://us-south.ml.cloud.ibm.com
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      ENVIRONMENT: test
      CORS_ORIGINS: http://localhost:3000
      ALLOW_ANONYMOUS_DEMO_SEED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt -r requirements-dev.txt

      - name: Audit production dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Lint
        run: python -m ruff check app tests migrations

      - name: Compile application
        run: python -m compileall -q app

      - name: Run tests
        run: python -m pytest tests -q -p no:cacheprovider

      - name: Validate migration graph
        run: python -m alembic heads

      - name: Compile PostgreSQL migration SQL
        run: python -m alembic upgrade head --sql > migration.sql
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:placeholder@localhost:5432/postgres
