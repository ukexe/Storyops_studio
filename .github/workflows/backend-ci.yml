name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite:///./ci.db
      WATSONX_API_KEY: ci-placeholder
      WATSONX_PROJECT_ID: ci-placeholder
      WATSONX_URL: https://us-south.ml.cloud.ibm.com
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      SUPABASE_SECRET_KEY: ci-placeholder
      SUPABASE_JWKS_URL: https://ci-placeholder.supabase.co/auth/v1/.well-known/jwks.json
      ENVIRONMENT: test
      CORS_ORIGINS: http://localhost:3000
      ALLOW_ANONYMOUS_DEMO_SEED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt -r requirements-dev.txt

      - name: Audit production dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Lint
        run: python -m ruff check app tests migrations

      - name: Compile application
        run: python -m compileall -q app

      - name: Run tests
        run: python -m pytest tests -q -p no:cacheprovider

      - name: Validate migration graph
        run: python -m alembic heads

      - name: Compile PostgreSQL migration SQL
        run: python -m alembic upgrade head --sql > migration.sql
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:placeholder@localhost:5432/postgres

      - name: Set up Node.js for edge API
        uses: actions/setup-node@v5
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: backend/cloudflare/package-lock.json

      - name: Install edge API dependencies
        run: npm ci
        working-directory: backend/cloudflare

      - name: Audit edge API dependencies
        run: npm audit --audit-level=moderate
        working-directory: backend/cloudflare

      - name: Type-check edge API
        run: npm run typecheck
        working-directory: backend/cloudflare

      - name: Check edge Worker binding types
        run: npm run cf-typecheck
        working-directory: backend/cloudflare

      - name: Test edge analysis rules
        run: npm test
        working-directory: backend/cloudflare

      - name: Validate edge API bundle
        run: npm run dry-run
        working-directory: backend/cloudflare
